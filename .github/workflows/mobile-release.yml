name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Mobile version to publish"
        required: true
        default: "1.7.4"

permissions:
  contents: write

jobs:
  android-and-ota:
    name: Android + OTA GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
          fi
          echo "MOBILE_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MOBILE_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Build mobile web bundle
        run: npm run build:mobile

      - name: Prepare OTA bundle for GitHub
        run: node scripts/prepare-mobile-ota.mjs

      - name: Prepare native Android assets
        run: npm run mobile:native-assets

      - name: Build Android APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Collect release assets
        run: |
          mkdir -p release-mobile/android
          cp android/app/build/outputs/apk/debug/*.apk release-mobile/android/
          cp android/app/build/outputs/apk/release/*.apk release-mobile/android/ || true
          cat > release-mobile/RELEASE_NOTES.md <<'EOF'
          Lyceum Mobile release with GitHub-hosted OTA updates.

          OTA scope: HTML/CSS/JS bundle updates only. Native changes still require installing a new Android/iOS build.
          Android APKs are attached below. iOS distribution requires Apple signing/TestFlight/App Store credentials.
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mobile-v${MOBILE_RELEASE_VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Lyceum Mobile ${MOBILE_RELEASE_VERSION}" --notes-file release-mobile/RELEASE_NOTES.md
          gh release upload "$TAG" release-mobile/lyceum-mobile-ota.json release-mobile/lyceum-mobile-ota-${MOBILE_RELEASE_VERSION}.zip release-mobile/android/*.apk --clobber

  ios-native-check:
    name: iOS native project check
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
          fi
          echo "MOBILE_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MOBILE_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build:mobile
      - name: Prepare native iOS assets
        run: npm run mobile:native-assets

      - name: Build iOS project without signing
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            MARKETING_VERSION="${MOBILE_RELEASE_VERSION}" \
            CURRENT_PROJECT_VERSION="${MOBILE_VERSION_CODE}" \
            CODE_SIGNING_ALLOWED=NO \
            build
