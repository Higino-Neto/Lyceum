name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Mobile version to publish"
        required: true
        default: "1.7.5"

permissions:
  contents: write

jobs:
  android-and-ota:
    name: Android + OTA GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
          fi
          IFS='.' read -r MAJOR MINOR PATCH REST <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH%%[^0-9]*}"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          echo "MOBILE_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MOBILE_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - run: npm ci

      - name: Build mobile web bundle
        run: npm run build:mobile

      - name: Prepare OTA bundle for GitHub
        run: node scripts/prepare-mobile-ota.mjs

      - name: Prepare native Android assets
        run: npm run mobile:native-assets

      - name: Restore signing keystore for release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_SIGNING_STORE_PASSWORD" ] || [ -z "$ANDROID_SIGNING_KEY_ALIAS" ] || [ -z "$ANDROID_SIGNING_KEY_PASSWORD" ]; then
            echo "Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_SIGNING_STORE_PASSWORD, ANDROID_SIGNING_KEY_ALIAS and ANDROID_SIGNING_KEY_PASSWORD."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.keystore"
          echo "ANDROID_SIGNING_STORE_FILE=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_STORE_PASSWORD=$ANDROID_SIGNING_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_KEY_ALIAS=$ANDROID_SIGNING_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_SIGNING_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Android APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Collect release assets
        run: |
          mkdir -p release-mobile/android
          cp "$(ls android/app/build/outputs/apk/debug/*.apk | head -n 1)" "release-mobile/android/lyceum-mobile-${MOBILE_RELEASE_VERSION}-debug.apk"
          cp "$(ls android/app/build/outputs/apk/release/*.apk | head -n 1)" "release-mobile/android/lyceum-mobile-${MOBILE_RELEASE_VERSION}.apk"
          cat > release-mobile/RELEASE_NOTES.md <<'EOF'
          Lyceum Mobile release with GitHub-hosted OTA and APK updates.

          OTA scope: HTML/CSS/JS bundle updates only.
          APK scope: native Android app updates through the in-app updater.
          iOS distribution requires Apple signing/TestFlight/App Store credentials.
          EOF

      - name: Prepare APK update manifest
        run: node scripts/prepare-mobile-apk-manifest.mjs

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mobile-v${MOBILE_RELEASE_VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Lyceum Mobile ${MOBILE_RELEASE_VERSION}" --notes-file release-mobile/RELEASE_NOTES.md
          gh release upload "$TAG" release-mobile/lyceum-mobile-ota.json release-mobile/lyceum-mobile-ota-${MOBILE_RELEASE_VERSION}.zip release-mobile/lyceum-mobile-latest.json release-mobile/android/*.apk --clobber

  ios-native-check:
    name: iOS native project check
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
          fi
          IFS='.' read -r MAJOR MINOR PATCH REST <<< "$VERSION"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH%%[^0-9]*}"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          echo "MOBILE_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MOBILE_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build:mobile
      - name: Prepare native iOS assets
        run: npm run mobile:native-assets

      - name: Build iOS project without signing
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            MARKETING_VERSION="${MOBILE_RELEASE_VERSION}" \
            CURRENT_PROJECT_VERSION="${MOBILE_VERSION_CODE}" \
            CODE_SIGNING_ALLOWED=NO \
            build
